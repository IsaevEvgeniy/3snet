name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Install Allure
        run: npm install -D allure-commandline
      - name: Run Playwright tests
        run: npx playwright test --reporter=github,html,allure-playwright
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
        continue-on-error: true
      - name: Generate Allure Report
        if: always()
        run: npx allure-commandline generate allure-results --clean -o allure-report
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
      - name: Publish report to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git reset --hard HEAD
          git pull origin main --rebase
          mkdir -p docs docs/allure
          cp -r playwright-report/. docs/
          cp -r allure-report/. docs/allure/
          touch docs/.nojekyll
          git add docs/
          git diff --staged --quiet || git commit -m "chore: update playwright report [skip ci]"
          git push origin main
